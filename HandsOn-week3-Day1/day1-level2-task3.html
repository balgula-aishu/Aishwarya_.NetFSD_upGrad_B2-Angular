<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>product Cart</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
        }

        .header {
            background: #2e59d9;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
        }

        .cart-count {
            font-weight: bold;
        }

        .container {
            width: 800px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .product {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .product h3 {
            margin-bottom: 10px;
        }

        .product p {
            margin-bottom: 15px;
        }

        button {
            padding: 8px 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:disabled {
            background: gray;
            cursor: not-allowed;
        }

        .message {
            margin-top: 10px;
            font-size: 14px;
            color: green;
        }
    </style>
</head>
<body>
    <div class="header">
        🛒 Cart Items: <span id="cartCounter" class="cart-count">0</span>
    </div>
    <div class="container" id="productContainer">
        <div class="product">
            <h3>Laptop</h3>
            <p>Price: ₹50,000</p>
            <button class="addBtn">Add to Cart</button>
            <div class="message"></div>
        </div>

        <div class="product">
            <h3>HeadPhones</h3>
            <p>Price: ₹2,000</p>
            <button class="addBtn">Add to Cart</button>
            <div class="message"></div>
        </div>
        <div class="product">
            <h3>SmartPhone</h3>
            <p>Price: ₹20,000</p>
            <button class="addBtn">Add to Cart</button>
            <div class="message"></div>
        </div>
        <div class="product">
            <h3>Watch</h3>
            <p>Price: ₹5,000</p>
            <button class="addBtn">Add to Cart</button>
            <div class="message"></div>
        </div>
    </div>
    <script>
        $(document).ready(function(){
            var cartCount=0;

            $("#productContainer").on("click", ".addBtn",function(){
                // increment the counter value while adding product into cart
                cartCount++;

                // updating the counter value using text
                $("#cartCounter").text(cartCount);
                // disable buttn using prop
                $(this).prop("disabled",true);

                // change button text while added to cart using text
                $(this).text("Added");

                // if product is already added then add attribute using attr
                $(this).attr("title", "Product already added");

                // show confirmation mesage if product added
                $(this).siblings(".message")
                .text("Product added successfully!")
            })
        
        })
    </script>
</body>
</html>
