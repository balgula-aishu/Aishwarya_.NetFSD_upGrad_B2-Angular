<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Electronics Store</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">ElectroMart</a>
    </div>
</nav>

<!-- PRODUCT SECTION -->
<div class="container py-5">

    <h2 class="text-center mb-4 fw-bold">Our Products</h2>

    <div class="row g-4">

        <!-- PRODUCT 1 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="../../images/laptop.jpeg" class="card-img-top" alt="Laptop">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Laptop</h5>
                    <p class="card-text text-muted small">High performance laptop for work and gaming.</p>
                    <h6 class="fw-bold mb-3">₹55,000</h6>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm w-100 mb-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm w-100">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- PRODUCT 2 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="../../images/smartphone.jpeg" class="card-img-top" alt="Smartphone">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Smartphone</h5>
                    <p class="card-text text-muted small">Latest 5G smartphone with great camera.</p>
                    <h6 class="fw-bold mb-3">₹25,000</h6>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm w-100 mb-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm w-100">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- PRODUCT 3 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="../../images/headphones.jpeg">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Headphones</h5>
                    <p class="card-text text-muted small">Noise cancelling wireless headphones.</p>
                    <h6 class="fw-bold mb-3">₹5,000</h6>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm w-100 mb-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm w-100">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- PRODUCT 4 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="../../images/watch.jpeg" class="card-img-top" alt="Smart Watch">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Smart Watch</h5>
                    <p class="card-text text-muted small">Fitness tracking smart watch.</p>
                    <h6 class="fw-bold mb-3">₹7,500</h6>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm w-100 mb-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary btn-sm w-100">View Details</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
