<!DOCTYPE html>
<html>

<head>
    <title>Manage Events</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark "style="background-color:#001f3f;">
    <div class="container">

        <a class="navbar-brand" href="index.html">Upgrad Events</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html" style="color: white; font-size: 20px;">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="events.html" style="color: white; font-size: 20px;">Events</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html" style="color: white; font-size: 20px;">Contact</a></li>
                <li class="nav-item">
                    <button class="btn btn-danger ms-2" onclick="logout()">Logout</button>
                </li>
            </ul>
        </div>

    </div>
</nav>

<div class="container mt-5">

    <h3 class="text-center mb-4">Manage Events</h3>

    <div class="row">

        <!-- ADD EVENT FORM -->
        <div class="col-md-4">
            <div class="card shadow p-4">
                <h5 class="mb-3 text-success">Add Event</h5>

                <form id="eventForm">
                    <input class="form-control mb-3" id="eventId" placeholder="Event ID" required>
                    <input class="form-control mb-3" id="eventName" placeholder="Event Name" required>
                    <select class="form-control mb-3" id="eventCategory" required>
                        <option value="">Select Category</option>
                        <option>Tech & Innovations</option>
                        <option>Industrial Event</option>
                    </select>
                    <input type="date" class="form-control mb-3" id="eventDate" required>
                    <input type="time" class="form-control mb-3" id="eventTime" required>
                    <input type="url" class="form-control mb-3" id="eventUrl" placeholder="Event URL" required>

                    <button type="submit" class="btn btn-success w-100">Add Event</button>
                </form>
            </div>
        </div>

        <!-- SEARCH + EVENTS LIST -->
        <div class="col-md-8">

            <h5 class="mb-3">Search Event</h5>
            <div class="card shadow p-3 mb-4">
                <!-- Dropdown + Search Button -->
                <div class="d-flex gap-2">
                    <select id="searchType" class="form-select">
                        <option value="all">Search All</option>
                        <option value="id">Search by ID</option>
                        <option value="name">Search by Name</option>
                        <option value="category">Search by Category</option>
                    </select>
                    <button id="searchBtn" class="btn btn-primary" style="background-color:#001f3f;">Search</button>
                </div>
            </div>

            <!-- Events List -->
            <div class="row" id="eventContainer"></div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS FILES -->
<script src="../js/db.js"></script>
<script src="../js/events.js"></script>

<script>
    if(sessionStorage.getItem("admin") !== "true"){
        alert("Unauthorized Access");
        window.location.href = "login.html";
    }

    function logout(){

        // Close navbar if open (mobile fix)
        let nav = document.querySelector(".navbar-collapse");
        if(nav && nav.classList.contains("show")){
            nav.classList.remove("show");
        }

        // Clear session
        sessionStorage.removeItem("admin");
        //show logout message
        alert("You have successfully logged out!");

        // Redirect
        window.location.href = "login.html";
    }
</script>

</body>
</html>
