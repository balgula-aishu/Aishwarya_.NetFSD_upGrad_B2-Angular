<h4 class="text-center mb-4">Contact Us</h4>

<form id="contactForm">

<input type="text"
id="name"
class="form-control mb-3"
placeholder="Name"
required>

<input type="email"
id="email"
class="form-control mb-3"
placeholder="Email"
required>

<textarea
id="message"
class="form-control mb-3"
rows="4"
placeholder="Description"
required>Please enter your queries here!</textarea>

<button type="submit" class="btn btn-primary w-100" style="background-color: #001f3f;">
Submit Query
</button>

</form>
