<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Notes Saver</title>
    <style type="text/css">
        body{
          background-color:  #f4f6f8;
          font-family: Arial, Helvetica, sans-serif;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
        }
      .container{
        background-color: white;
        padding: 25px;
        width: 400px;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        text-align: center;
      }
      h2{
        margin-bottom:15px ;
      }
      textarea{
        width: 100%;
        height: 150px;
        padding: px;
        border-radius: 6px;
        border: 1px solid #ccc;
        resize: none;
        font-size: 14px;
      }
      .buttons{
        margin-top: 15px;
      }
      button{
        padding: 8px 15px;
        border: none;
        border-radius: 5px;
        background-color: rgb(77, 77, 243);
        cursor: pointer;
        font-size: 14px;
        margin: 5px;
        color: white;
      }
      button:hover{
        opacity: 0.9;
      }

    </style>
</head>
<body>
    <div class="container">
    <h2>My Daily Notes</h2>
    <textarea name="text" id="noteArea" rows="8" cols="40" placeholder="Write your note here!..."></textarea>
    <br><br>
    <div class="buttons">
    <button onclick="saveNote()">Save</button>
    <button onclick="clearNote()">Clear</button>
    </div>
</div>
    </body>
    <script>
    //   first function runs automatically when page reload
    window.onload=function(){
        let saveNote=localStorage.getItem("myNote");
        if(saveNote!==null){
            document.getElementById("noteArea").value=saveNote;
        }
    }
    // save notes to local storage
    function saveNote(){
        let noteText=document.getElementById("noteArea").value;
        localStorage.setItem("myNote",noteText);
        alert("Note saved successfully!");
    }
    // clear note from local storage
    function clearNote(){
        localStorage.removeItem("myNote");
        document.getElementById("noteArea").value="";
        alert("Note cleared successfully!")
    }
    </script>
</body>
</html>
