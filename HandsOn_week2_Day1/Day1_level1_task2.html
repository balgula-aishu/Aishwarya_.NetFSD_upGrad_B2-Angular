<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Form Validation</title>
    <style type="text/css">
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        h2{
             margin-left:50px;
             font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;

        }

        .form-box {
            background: white;
            padding: 20px;
            width: 350px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            
        }

        input {
            width: 80%;
            height: 30px;
            border-radius: 5px;
            border: 1px soild rgba(255, 252, 252, 0.964);
           
        }

        .error {
            color: red;
            font-size: 12px;
        }

        button {
            margin-top: 10px;
            margin-left: 110px;
            padding: 8px;
            width: 40%;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
        }

    </style>
</head>
<body>
    <div class="form-box">
    <h2>Live Validation From</h2>
    Name:
    <input type="text" id="name" onchange="validateName()">
    <span id="nameError" class="error"></span>
    <br><br>
    Email:
    <input type="email" name="email" id="email" onchange="validateEmail()">
    <span id="emailError" class="error"></span>
    <br><br>
    Age:
    <input type="number" name="age" id="age" onchange="validateAge()">
    <span id="ageError" class="error"></span>
    <br><br>
  <button onclick="submitForm()">Submit</button>
    </div>
    <script>
        function validateName(){
            let name=document.getElementById("name").value;
            if(name===""){
                document.getElementById("nameError").innerText="Name cannot be empty";
            }else{
                document.getElementById("nameError").innerText="";
            }
        }

        function validateEmail(){
            let email=document.getElementById("email").value;
            if(!email.includes("@")){
                document.getElementById("emailError").innerText="Email must contain @";
            }else{
                document.getElementById("emailError").innerText="";
            }
        }
        function validateAge(){
            let age=document.getElementById("age").value;
             if(age<=18){
                document.getElementById("ageError").innerText="Age must be greater than 18";
             }else{
                document.getElementById("ageError").innerText="";
             }
        }
        function submitForm(){
            let name=document.getElementById("name").value;
            let email=document.getElementById("email").value;
            let age=document.getElementById("age").value;

            if(name!=="" && email.includes("@") && age>18){
                sessionStorage.setItem("userName",name);
                sessionStorage.setItem("userEmail",email);
                sessionStorage.setItem("userAge",age);

                alert("Data stored successfully");
            }else{
                alert("please fix errors before submitting");
            }
        }
    </script>
</body>
</html>
